name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup & Build Go (Backend & Agent)
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22" # Sesuaikan dengan versi Go Anda

      - name: Build Backend
        run: |
          cd backend
          go mod download
          # Build executable untuk OS Linux
          GOOS=linux GOARCH=amd64 go build -o server_bin ./cmd/server/main.go

      - name: Build Agent
        run: |
          cd agent
          go mod download
          GOOS=linux GOARCH=amd64 go build -o agent_bin ./main.go

      # 2. Setup & Build Node.js (Frontend)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Sesuaikan dengan versi Node Anda

      - name: Build Frontend
        run: |
          cd frontend
          cat <<EOF > .env
          VITE_API_URL=${{ vars.VITE_API_URL }}
          VITE_PORT=${{ vars.VITE_PORT }}
          EOF
          npm install
          npm run build

      - name: Generate Backend .env
        run: |
          cat <<EOF > backend/.env
          DB_HOST=${{ vars.DB_HOST }}
          DB_PORT=${{ vars.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ vars.DB_NAME }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          APP_PORT=${{ vars.APP_PORT || '8001' }}
          EOF

      - name: Generate Agent .env
        run: |
          mkdir -p agent
          cat <<EOF > agent/.env
          API_URL=${{ vars.API_URL }}
          API_KEY=${{ secrets.AGENT_API_KEY }}
          EOF

      # 3. Copy Files to VPS via SCP
      - name: Copy files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "backend/server_bin,backend/.env,agent/agent_bin,agent/.env,frontend/dist/"
          target: "/opt/server-monitoring"
          strip_components: 0

      # 4. Restart Services via SSH
      - name: Restart Services on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /opt/server-monitoring
            chmod +x backend/server_bin
            chmod +x agent/agent_bin


            echo "Mengupdate backend-monitoring.service..."
            sudo bash -c 'cat <<EOF > /etc/systemd/system/backend-monitoring.service
            [Unit]
            Description=Backend Monitoring Service
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/opt/server-monitoring/backend
            EnvironmentFile=/opt/server-monitoring/backend/.env
            ExecStart=/opt/server-monitoring/backend/server_bin
            Restart=always

            [Install]
            WantedBy=multi-user.target
            EOF'
            sudo systemctl daemon-reload
            sudo systemctl enable backend-monitoring.service

            echo "Mengupdate agent-monitoring.service..."
            sudo bash -c 'cat <<EOF > /etc/systemd/system/agent-monitoring.service
            [Unit]
            Description=Agent Monitoring Service
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/opt/server-monitoring/agent
            EnvironmentFile=/opt/server-monitoring/agent/.env
            ExecStart=/opt/server-monitoring/agent/agent_bin
            Restart=always

            [Install]
            WantedBy=multi-user.target
            EOF'
            sudo systemctl daemon-reload
            sudo systemctl enable agent-monitoring.service

            # 3. Restart kedua service
            sudo systemctl restart backend-monitoring
            sudo systemctl restart agent-monitoring
