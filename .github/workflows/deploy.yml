name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup & Build Go (Backend & Agent)
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22" # Sesuaikan dengan versi Go Anda

      - name: Build Backend
        run: |
          cd backend
          go mod download
          # Build executable untuk OS Linux
          GOOS=linux GOARCH=amd64 go build -o server_bin ./cmd/server/main.go

      - name: Build Agent
        run: |
          cd agent
          go mod download
          GOOS=linux GOARCH=amd64 go build -o agent_bin ./main.go

      # 2. Setup & Build Node.js (Frontend)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Sesuaikan dengan versi Node Anda

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Generate Backend .env
        run: |
          cat <<EOF > backend/.env
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF

      # 3. Copy Files to VPS via SCP
      - name: Copy files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "backend/server_bin,backend/.env,agent/agent_bin,frontend/dist/"
          target: "/opt/server-monitoring"
          strip_components: 0

      # 4. Restart Services via SSH
      - name: Restart Services on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /opt/server-monitoring
            chmod +x backend/server_bin
            chmod +x agent/agent_bin


            if [ ! -f /etc/systemd/system/backend-monitoring.service ]; then
              echo "create backend-monitoring.service..."
              sudo bash -c 'cat <<EOF > /etc/systemd/system/backend-monitoring.service
            [Unit]
            Description=Backend Monitoring Service
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/opt/server-monitoring/backend
            ExecStart=/opt/server-monitoring/backend/server_bin
            Restart=always

            [Install]
            WantedBy=multi-user.target
            EOF'
              sudo systemctl daemon-reload
              sudo systemctl enable backend-monitoring.service
            fi


            if [ ! -f /etc/systemd/system/agent-monitoring.service ]; then
              echo "create agent-monitoring.service..."
              sudo bash -c 'cat <<EOF > /etc/systemd/system/agent-monitoring.service
            [Unit]
            Description=Agent Monitoring Service
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/opt/server-monitoring/agent
            ExecStart=/opt/server-monitoring/agent/agent_bin
            Restart=always

            [Install]
            WantedBy=multi-user.target
            EOF'
              sudo systemctl daemon-reload
              sudo systemctl enable agent-monitoring.service
            fi

            # 3. Restart kedua service
            sudo systemctl restart backend-monitoring
            sudo systemctl restart agent-monitoring
